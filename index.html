<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salary Slip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    font-family:Arial;
    background:#eef2ff;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1e3a8a;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:20px;
}

label{
    font-weight:bold;
    font-size:13px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.slip{
    margin-top:25px;
    border:2px solid #000;
    padding:20px;
    background:white;
}

.header{
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.sub{
    text-align:center;
    margin-bottom:15px;
}

.info{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    margin-top:10px;
}

.table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

.table th, .table td{
    border:1px solid #000;
    padding:8px;
}

.final{
    text-align:right;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

<h1>Salary Slip</h1>

<div class="grid">

<div>
<label>Employee Name</label>
<input id="name">
</div>

<div>
<label>Employee ID</label>
<input id="empid">
</div>

<div>
<label>Department Name</label>
<input id="dept">
</div>

<div>
<label>Salary Month</label>
<input id="month" placeholder="e.g. June 2026">
</div>

<div>
<label>Basic Pay (₹)</label>
<input id="basic">
</div>

<div>
<label>DA %</label>
<input id="da">
</div>

<div>
<label>HRA / Bairak Allowance (₹)</label>
<input id="hra" value="0">
</div>

<div>
<label>Food / Other Allowance (₹)</label>
<input id="ta" value="0">
</div>

<div>
<label>Other Allowance (₹)</label>
<input id="allowance" value="0">
</div>

<div>
<label>Other Deduction (₹)</label>
<input id="deduction" value="0">
</div>

<div>
<label>NPS %</label>
<input id="nps" value="10">
</div>

</div>

<button onclick="calculate()">Generate Salary Slip</button>
<button onclick="downloadPDF()">Download PDF</button>

<div class="slip" id="slip" style="display:none;">

<div class="header">PAY SLIP</div>
<div class="sub">Monthly Salary Statement</div>

<div class="info">
<div><b>Name:</b> <span id="s_name"></span></div>
<div><b>Employee ID:</b> <span id="s_empid"></span></div>
<div><b>Department:</b> <span id="s_dept"></span></div>
<div><b>Month:</b> <span id="s_month"></span></div>
<div><b>Basic Pay:</b> ₹ <span id="s_basic"></span></div>
<div><b>DA %:</b> <span id="s_daP"></span></div>
</div>

<table class="table">
<tr>
<th>Earnings</th>
<th>Amount</th>
<th>Deductions</th>
<th>Amount</th>
</tr>

<tr>
<td>Basic Pay</td>
<td id="s_basic2"></td>
<td>NPS</td>
<td id="s_nps"></td>
</tr>

<tr>
<td>Dearness Allowance</td>
<td id="s_da"></td>
<td>Other Deduction</td>
<td id="s_other"></td>
</tr>

<tr>
<td>HRA</td>
<td id="s_hra"></td>
<td></td><td></td>
</tr>

<tr>
<td>Food / Other Allowance</td>
<td id="s_ta"></td>
<td></td><td></td>
</tr>

<tr>
<td>Other Allowance</td>
<td id="s_allow"></td>
<td></td><td></td>
</tr>

<tr>
<th>Gross Pay</th>
<th id="s_gross"></th>
<th>Total Deduction</th>
<th id="s_totalded"></th>
</tr>
</table>

<div class="final">
Net Pay: ₹ <span id="s_net"></span>
</div>

</div>

</div>

<script>

function format(n){
    return Number(n || 0).toLocaleString('en-IN',{maximumFractionDigits:2});
}

function calculate(){

    let name = document.getElementById("name").value;
    let empid = document.getElementById("empid").value;
    let dept = document.getElementById("dept").value;
    let month = document.getElementById("month").value;

    let basic = +document.getElementById("basic").value || 0;
    let daP = +document.getElementById("da").value || 0;
    let hra = +document.getElementById("hra").value || 0;
    let ta = +document.getElementById("ta").value || 0;
    let allow = +document.getElementById("allowance").value || 0;
    let other = +document.getElementById("deduction").value || 0;
    let npsP = +document.getElementById("nps").value || 0;

    let da = (basic * daP)/100;
    let gross = basic + da + hra + ta + allow;
    let nps = (basic + da) * (npsP/100);
    let totalDed = nps + other;
    let net = gross - totalDed;

    document.getElementById("s_name").innerText = name;
    document.getElementById("s_empid").innerText = empid;
    document.getElementById("s_dept").innerText = dept;
    document.getElementById("s_month").innerText = month;

    document.getElementById("s_basic").innerText = format(basic);
    document.getElementById("s_basic2").innerText = format(basic);
    document.getElementById("s_daP").innerText = daP + "%";

    document.getElementById("s_da").innerText = format(da);
    document.getElementById("s_hra").innerText = format(hra);
    document.getElementById("s_ta").innerText = format(ta);
    document.getElementById("s_allow").innerText = format(allow);

    document.getElementById("s_nps").innerText = format(nps);
    document.getElementById("s_other").innerText = format(other);

    document.getElementById("s_gross").innerText = format(gross);
    document.getElementById("s_totalded").innerText = format(totalDed);
    document.getElementById("s_net").innerText = format(net);

    document.getElementById("slip").style.display = "block";
}

function downloadPDF(){

    const slip = document.getElementById("slip");

    html2canvas(slip).then(canvas => {
        const imgData = canvas.toDataURL("image/png");

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF("p","mm","a4");

        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

        pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
        pdf.save("salary-slip.pdf");
    });
}

</script>

</body>
</html>
